<!-- ALLO BÉTON - ICÔNE SEULE (pour favicon et navbar) -->
<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cube béton 3D -->
  <g transform="translate(5, 5)">
    <!-- Face avant -->
    <path d="M15 2 L28 9 L28 24 L15 31 L2 24 L2 9 Z" fill="url(#gradient1)" stroke="#B45309" stroke-width="0.5"/>

    <!-- Face droite -->
    <path d="M15 2 L28 9 L28 24 L15 17 Z" fill="url(#gradient2)" opacity="0.9"/>

    <!-- Face gauche -->
    <path d="M2 9 L15 2 L15 17 L2 24 Z" fill="url(#gradient3)" opacity="0.85"/>

    <!-- Texture béton (grains) -->
    <circle cx="10" cy="14" r="1.5" fill="#FFFFFF" opacity="0.35"/>
    <circle cx="18" cy="12" r="1" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="22" cy="16" r="1.2" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="12" cy="19" r="0.8" fill="#FFFFFF" opacity="0.25"/>

    <!-- Lignes de texture -->
    <line x1="8" y1="16" x2="12" y2="16" stroke="#000000" stroke-width="0.4" opacity="0.2"/>
    <line x1="18" y1="14" x2="22" y2="14" stroke="#000000" stroke-width="0.4" opacity="0.2"/>

    <!-- Accent lumineux -->
    <path d="M15 2 L18 4 L18 8 L15 6 Z" fill="#FBBF24" opacity="0.7"/>

    <!-- Lettre "A" stylisée en relief -->
    <text x="15" y="20" font-family="'Arial Black', sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" text-anchor="middle" opacity="0.95">
      A
    </text>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B45309;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
