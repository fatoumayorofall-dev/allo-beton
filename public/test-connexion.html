<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Connexion Allo Beton</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }
        .debug {
            margin-top: 20px;
            padding: 12px;
            background: #f3f4f6;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .btn-redirect {
            margin-top: 15px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Test Connexion Allo Beton</h1>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" value="admin@allobeton.sn" />
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" value="admin123" />
        </div>

        <button id="loginBtn" onclick="testLogin()">Se connecter</button>

        <div id="status" class="status info" style="display:none;"></div>

        <button id="redirectBtn" class="btn-redirect" style="display:none;" onclick="goToApp()">
            Aller vers l'application
        </button>

        <div id="debug" class="debug" style="display:none;"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';

        function log(msg) {
            const debug = document.getElementById('debug');
            debug.style.display = 'block';
            debug.textContent += new Date().toLocaleTimeString() + ': ' + msg + '\n';
            debug.scrollTop = debug.scrollHeight;
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.className = 'status ' + type;
            status.textContent = message;
        }

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.textContent = 'Connexion en cours...';
            showStatus('Connexion en cours...', 'info');
            log('Tentative de connexion: ' + email);

            try {
                log('Envoi requete vers ' + API_URL + '/auth/login');

                const response = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                log('Reponse recue: status=' + response.status);

                const data = await response.json();
                log('Data: ' + JSON.stringify(data).substring(0, 200));

                if (data.success) {
                    // Sauvegarder le token
                    localStorage.setItem('auth_token', data.data.token);
                    log('Token sauvegarde dans localStorage');

                    showStatus('CONNEXION REUSSIE! Bienvenue ' + (data.data.user.first_name || data.data.user.email), 'success');

                    document.getElementById('redirectBtn').style.display = 'block';
                    btn.textContent = 'Connecte!';
                } else {
                    showStatus('Erreur: ' + (data.error || 'Echec connexion'), 'error');
                    log('Erreur: ' + data.error);
                    btn.disabled = false;
                    btn.textContent = 'Se connecter';
                }
            } catch (error) {
                log('ERREUR: ' + error.message);
                showStatus('Erreur reseau: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        }

        function goToApp() {
            window.location.href = '/';
        }

        // Test automatique au chargement
        window.onload = function() {
            log('Page chargee');
            log('Verification du backend...');

            fetch(API_URL + '/health')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        log('Backend OK: ' + data.status);
                        showStatus('Backend connecte - Pret a se connecter', 'success');
                    } else {
                        log('Backend erreur');
                        showStatus('Backend non disponible', 'error');
                    }
                })
                .catch(err => {
                    log('Backend OFFLINE: ' + err.message);
                    showStatus('ERREUR: Backend non disponible sur port 3001', 'error');
                });
        };
    </script>
</body>
</html>
