<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Dégradé principal bleu marine -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c5282"/>
      <stop offset="50%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#0f2744"/>
    </linearGradient>

    <!-- Dégradé orange accent -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6ad55"/>
      <stop offset="50%" stop-color="#ed8936"/>
      <stop offset="100%" stop-color="#dd6b20"/>
    </linearGradient>

    <!-- Effet de brillance -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fond carré arrondi -->
  <rect x="4" y="4" width="92" height="92" rx="20" ry="20" fill="url(#bgGrad)"/>

  <!-- Effet brillance -->
  <path d="M4 24 Q4 4 24 4 L76 4 Q96 4 96 24 L96 45 Q50 38 4 24 Z" fill="url(#shine)" opacity="0.7"/>

  <!-- Bande orange en bas -->
  <rect x="4" y="76" width="92" height="20" fill="url(#orangeGrad)" clip-path="inset(0 0 0 0 round 0 0 20px 20px)"/>
  <rect x="4" y="76" width="92" height="5" fill="white" opacity="0.2"/>

  <!-- Lettre A blanche -->
  <text x="16" y="70" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-4">A</text>

  <!-- Lettre B orange -->
  <text x="50" y="70" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="url(#orangeGrad)" letter-spacing="-4">B</text>

  <!-- Petit cube décoratif -->
  <rect x="78" y="8" width="14" height="14" rx="4" fill="url(#orangeGrad)" opacity="0.95"/>
  <rect x="78" y="8" width="14" height="5" rx="2" fill="white" opacity="0.35"/>
</svg>
